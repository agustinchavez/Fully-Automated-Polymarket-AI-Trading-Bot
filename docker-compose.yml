version: "3.9"

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: polymarket-bot
    env_file:
      - .env
    ports:
      - "2345:2345"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./reports:/app/reports
      - ./config.yaml:/app/config.yaml:ro
      - ./secrets:/app/secrets:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:2345/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1.0"
    # Default: run dashboard with embedded engine
    command: ["dashboard"]
    # Override CMD for other commands:
    #   docker compose run bot scan --limit 20
    #   docker compose run bot forecast <CONDITION_ID>

  # SearXNG — self-hosted meta-search engine (free, unlimited, no API key)
  # To enable: uncomment this service block and set search_provider: searxng in config.yaml
  searxng:
    image: searxng/searxng:latest
    container_name: polymarket-searxng
    ports:
      - "8080:8080"
    volumes:
      - ./searxng:/etc/searxng
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
    restart: unless-stopped
    profiles:
      - searxng
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
