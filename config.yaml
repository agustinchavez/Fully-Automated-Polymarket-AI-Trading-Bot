scanning:
  min_volume_usd: 1000
  min_liquidity_usd: 2000
  max_spread: 0.06
  max_days_to_expiry: 120
  max_market_age_hours: 720
  batch_size: 100
  preferred_types:
    - MACRO
    - ELECTION
    - CORPORATE
    - LEGAL
    - TECHNOLOGY
    - SCIENCE
    - SPORTS
  restricted_types:
    - WEATHER
  filter_min_score: 25
  filter_blocked_types:
    - UNKNOWN
    # - SPORTS
  research_cooldown_minutes: 60
  category_cooldown_minutes:
    SPORTS: 20
    CULTURE: 30
    MACRO: 90
    GEOPOLITICS: 120
    ELECTION: 90
research:
  max_sources: 10
  source_timeout_secs: 22
  # Default: duckduckgo → tavily → serpapi fallback chain
  # To use SearXNG (unlimited, no API key, self-hosted):
  #   1. docker compose --profile searxng up
  #   2. Change search_provider below to: searxng
  search_provider: fallback
  fetch_full_content: true
  max_content_length: 20000
  content_fetch_top_n: 8
  min_corroborating_sources: 2
  stale_days_penalty_threshold: 7
  stale_days_heavy_penalty: 30
  fred_enabled: true
  congress_enabled: true
  courtlistener_enabled: true
  coingecko_enabled: true
  openmeteo_enabled: true
  gdelt_enabled: true
  fred_max_series: 3
  congress_max_bills: 5
  coingecko_max_coins: 3
  gdelt_timespan_days: 7
  edgar_enabled: true
  arxiv_enabled: true
  openfda_enabled: true
  worldbank_enabled: true
  edgar_max_filings: 3
  arxiv_max_results: 5
  worldbank_mrv: 3
  kalshi_prior_enabled: true # needs Kalshi API key
  metaculus_enabled: true # needs METACULUS_API_KEY
  wikipedia_pageviews_enabled: true
  google_trends_enabled: false # needs SERPAPI_KEY or TAVILY_API_KEY with quota
  reddit_sentiment_enabled: false
  pubmed_enabled: true
  sports_odds_enabled: true # needs ODDS_API_KEY
  sports_stats_enabled: true # needs API_FOOTBALL_KEY
  spotify_charts_enabled: true # no API key needed (kworb.net)
  manifold_enabled: true
  predictit_enabled: true
  primary_domains:
    MACRO:
      - bls.gov
      - bea.gov
      - federalreserve.gov
      - fred.stlouisfed.org
      - treasury.gov
      - imf.org
    ELECTION:
      - fec.gov
      - ballotpedia.org
      - 270towin.com
      - fivethirtyeight.com
      - realclearpolling.com
    CORPORATE:
      - sec.gov
      - data.sec.gov
      - investor.com
      - nasdaq.com
      - nyse.com
    LEGAL:
      - supremecourt.gov
      - uscourts.gov
      - courtlistener.com
      - law.cornell.edu
    SCIENCE:
      - nature.com
      - science.org
      - arxiv.org
      - pubmed.ncbi.nlm.nih.gov
      - clinicaltrials.gov
      - fda.gov
    TECH:
      - sec.gov
      - arxiv.org
      - github.com
      - techcrunch.com
    CRYPTO:
      - coindesk.com
      - defillama.com
      - coingecko.com
      - messari.io
    GEOPOLITICS:
      - un.org
      - state.gov
      - nato.int
      - foreignaffairs.com
    WEATHER:
      - noaa.gov
      - nhc.noaa.gov
      - weather.gov
  secondary_domains:
    - reuters.com
    - apnews.com
    - bloomberg.com
    - wsj.com
    - ft.com
    - nytimes.com
    - bbc.com
    - economist.com
    - cnbc.com
    - marketwatch.com
  blocked_domains:
    - reddit.com
    - twitter.com
    - x.com
    - tiktok.com
    - facebook.com
    - wikipedia.org
    - quora.com
    - medium.com
    - substack.com
forecasting:
  llm_model: gpt-4o
  evidence_model: gpt-4o-mini
  llm_temperature: 0.2
  llm_max_tokens: 4096
  low_evidence_penalty: 0.15
  min_evidence_quality: 0.55
  prompt_version: v2
  base_rate_enabled: true
  min_confidence_level: MEDIUM
  category_min_confidence:
    GEOPOLITICS: LOW
    ELECTION: LOW
ensemble:
  enabled: true
  models:
    - gpt-4o
    - claude-sonnet-4-6
    - gemini-2.0-flash
    - grok-4-fast-reasoning
    - deepseek-chat
  aggregation: median
  min_models_required: 1
  fallback_model: gpt-4o
  timeout_per_model_secs: 30
  evidence_model_gating_enabled: true # reduce model count for low evidence quality
  longshot:
    enabled: true
    low_threshold: 0.12
    high_threshold: 0.88
    correction_strength: 0.20
    excluded_categories: []
risk:
  max_stake_per_market: 50.0
  max_daily_loss: 500.0
  max_open_positions: 25
  min_edge: 0.04
  min_liquidity: 2000
  min_volume: 1000
  max_spread: 0.06
  kelly_fraction: 0.25
  max_bankroll_fraction: 0.05
  bankroll: 5000.0
  transaction_fee_pct: 0.02
  exit_fee_pct: 0.02
  gas_cost_usd: 0.01
  min_implied_probability: 0.05
  stop_loss_pct: 0.2
  take_profit_pct: 0.3
  max_holding_hours: 240
  min_stake_usd: 1.0
  min_annualized_edge: 0.15
  use_probability_space_costs: true
  use_twap_edge: true
  volatility_high_threshold: 0.15
  volatility_med_threshold: 0.1
  volatility_high_min_mult: 0.4
  volatility_med_min_mult: 0.6
  category_stake_multipliers:
    SPORTS: 1.3
    MACRO: 1.0
    SCIENCE: 1.1
    TECH: 0.9
    CULTURE: 0.8
    CORPORATE: 0.75
    CRYPTO: 0.7
    ELECTION: 0.6
    GEOPOLITICS: 0.6
  kill_switch: false
drawdown:
  enabled: true
  max_drawdown_pct: 0.2
  warning_drawdown_pct: 0.1
  critical_drawdown_pct: 0.15
  auto_kill_at_max: true
portfolio:
  max_category_exposure_pct: 0.35
  max_single_event_exposure_pct: 0.25
  max_correlated_positions: 4
execution:
  dry_run: true
  default_order_type: limit
  slippage_tolerance: 0.01
  max_retries: 3
storage:
  db_type: sqlite
  sqlite_path: data/bot.db
cache:
  enabled: true
  search_ttl_secs: 3600
  max_cache_size_mb: 100
  max_size: 2000
  ttl_secs: 600
observability:
  log_level: INFO
  log_format: json
  log_file: logs/bot.log
  enable_metrics: true
alerts:
  enabled: true
  min_alert_level: info
  alert_on_trade: true
  alert_on_risk_breach: true
  alert_on_drawdown_warning: true
  alert_on_system_error: true
  alert_on_kill_switch: true
  daily_summary_enabled: true
  daily_summary_hour: 18
  # Email alerts via SMTP (set credentials in .env: SMTP_HOST, SMTP_PORT,
  # SMTP_USER, SMTP_PASS, ALERT_EMAIL_FROM, ALERT_EMAIL_TO)
  # Gmail: smtp.gmail.com:587 with App Password
  # Outlook: smtp.office365.com:587
  # iCloud: smtp.mail.me.com:587 with App-Specific Password
wallet_scanner:
  enabled: true
  whale_in_prompt: true
  scan_interval_minutes: 15
  min_whale_count: 1
  min_conviction_score: 15.0
  max_wallets: 20
  conviction_edge_boost: 0.08
  conviction_edge_penalty: 0.02
  whale_convergence_min_edge: 0.02
scanner:
  apiPool:
    strategy: least-loaded
    endpoints: []
budget:
  enabled: true
  daily_limit_usd: 15.0
  warning_pct: 0.8
model_tiers:
  enabled: true
  scout_models:
    - gpt-4o-mini
  standard_models:
    - gpt-4o
  premium_models:
    - gpt-4o
    - claude-sonnet-4-6
    - gemini-2.0-flash
    - grok-4-fast-reasoning
    - deepseek-chat
  premium_min_volume_usd: 10000.0
  premium_min_edge: 0.06
  scout_max_evidence_quality: 0.4
circuit_breakers:
  enabled: true
  default_failure_threshold: 5
  default_window_secs: 60.0
  default_recovery_timeout_secs: 30.0
engine:
  scan_interval_minutes: 10
  max_markets_per_cycle: 5
  auto_start: true
  paper_mode: true
  cycle_interval_secs: 180
digest:
  enabled: true
  schedule_day_of_week: mon
  schedule_hour: 8
  lookback_days: 7
  min_data_days: 3
analyst:
  enabled: true
  provider: anthropic
  model: claude-sonnet-4-6
  max_tokens: 1500
  temperature: 0.3
  timeout_secs: 45
  min_resolved_trades: 50
  min_data_days: 28
  rate_limit_hours: 6
  schedule_enabled: false
uma:
  enabled: true
  refresh_interval_mins: 15
calendar:
  enabled: true
  pre_event_size_reduction: 0.5
  refresh_interval_hours: 6
  lookahead_days: 14
